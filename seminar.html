<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Load Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Proper Bangla typeface (falls back automatically for non-Latin glyphs Inter can't render) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* Custom styles for a professional, dark cybersecurity theme */
        :root {
            --primary-color: #10b981; /* Emerald 500 */
            --secondary-color: #3b82f6; /* Blue 500 */
            --background-color: #0f172a; /* Slate 900 */
            --card-bg: #1e293b; /* Slate 800 */
        }
        body {
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            background-color: var(--background-color);
            color: #f8fafc; /* Slate 50 */
            min-height: 100vh;
            position: relative;
        }

        /* --- Signature ambient backdrop: faint grid + slow scanline (cybersecurity motif) --- */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(16, 185, 129, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(16, 185, 129, 0.05) 1px, transparent 1px);
            background-size: 42px 42px;
            pointer-events: none;
            z-index: 0;
        }
        body::after {
            content: "";
            position: fixed;
            left: 0;
            right: 0;
            top: -2px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(16, 185, 129, 0.45), transparent);
            pointer-events: none;
            z-index: 1;
            animation: scan 7s linear infinite;
        }
        @keyframes scan {
            0% { top: -2px; }
            100% { top: 100%; }
        }
        .max-w-4xl { position: relative; z-index: 2; }

        .simulator-card {
            background-color: var(--card-bg);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
            border-top: 4px solid var(--primary-color);
        }
        .custom-button {
            transition: all 0.2s;
            border: 1px solid var(--primary-color);
        }
        .custom-button:hover {
            background-color: var(--primary-color);
            color: var(--background-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
        }
        .custom-button:focus-visible {
            outline: 2px solid var(--secondary-color);
            outline-offset: 3px;
        }
        /* Disable button style */
        .custom-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            background-color: #334155; /* Slate 700 */
            color: #94a3b8; /* Slate 400 */
        }
        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 0.75rem;
            max-width: 90%;
            max-height: 90%;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        #cert-image-placeholder {
            max-width: 100%;
            height: auto;
            max-height: 60vh;
        }

        /* Slide transition */
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #presentation-container { animation: slideIn 0.35s ease-out; }

        /* Fullscreen toggle */
        #fullscreen-toggle {
            position: fixed;
            top: 14px;
            right: 14px;
            z-index: 50;
            font-size: 0.75rem;
        }

        @media (prefers-reduced-motion: reduce) {
            .animate-bounce, .animate-pulse, body::after, #presentation-container {
                animation: none !important;
            }
        }
    </style>
</head>

            </div>
        </div>

        <!-- Certificate Modal -->

            </div>
        </div>

                visualTitle: "Cybersecurity is a Human Safety Issue",
                content: `

        let currentScenarioIndex = 0;
        let simulationStarted = false;
        let startTimestamp = null;
        let timerInterval = null;

        // --- Certificate / diagram modal ---
        window.showCertificateDetails = function(name, description, icon, imagePath) {
            const modal = document.getElementById('certificate-modal');
            const certImage = document.getElementById('cert-image-placeholder');
            const certTitle = document.getElementById('cert-title');
            const certDescription = document.getElementById('cert-description');

            certImage.src = imagePath;
            certImage.onerror = function() {
                this.src = `https://placehold.co/300x200/1e293b/a5f3fc?text=${encodeURIComponent(name)}`;
            };

            certTitle.innerHTML = `${icon} ${name}`;
            certDescription.textContent = description;

            modal.style.display = 'flex';
        }

        window.showTypeDiagram = function(imagePath) {
             showCertificateDetails('Attack Type Diagram', 'Offensive Security-এর বিভিন্ন ধরনের Attack Type ও Path এখানে দেখানো হয়েছে।', '🗺️', imagePath);
        }

        window.closeModal = function() {
            document.getElementById('certificate-modal').style.display = 'none';
        }

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();
            }
        }

        // --- Keyboard navigation: Esc closes modal, arrows/space move between slides ---
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
                return;
            }
            const modalOpen = document.getElementById('certificate-modal').style.display === 'flex';
            if (modalOpen || !simulationStarted) return;

            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                e.preventDefault();
                loadScenario(currentScenarioIndex + 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                e.preventDefault();
                loadScenario(currentScenarioIndex - 1);
            }
        });

        function updateTimer() {
            if (startTimestamp === null) return;
            const diff = Math.floor((Date.now() - startTimestamp) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            const el = document.getElementById('storage-mode-display');
            if (el) el.textContent = `${m}:${s}`;
        }

        window.startSimulation = function() {
            if (simulationStarted) return;

            const contentDiv = document.getElementById('simulator-content');
            const dashboard = document.getElementById('status-dashboard');
            const progressBar = document.getElementById('progress-bar-container');

            if (!contentDiv || !dashboard) return;

            simulationStarted = true;
            currentScenarioIndex = 0;
            dashboard.style.display = 'flex';
            progressBar.style.display = 'block';

            startTimestamp = Date.now();
            updateTimer();
            timerInterval = setInterval(updateTimer, 1000);

            loadScenario(currentScenarioIndex);
        }

        window.loadScenario = function(index) {
            const contentDiv = document.getElementById('simulator-content');
            if (index < 0) index = 0;

            // Reaching past the final slide (index 13, since there are 13 slides at
            // indices 0-12) shows the closing Q&A screen.
            if (index >= presentationSteps.length) {
                showResults();
                return;
            }

            currentScenarioIndex = index;
            const step = presentationSteps[index];

            contentDiv.innerHTML = `
                <div id="presentation-container" class="space-y-6 w-full">
                    <h2 class="text-2xl md:text-3xl font-bold text-emerald-400 text-center">${step.title}</h2>
                    <div class="p-5 rounded-xl bg-slate-800/70 border-l-4 border-blue-500 shadow-2xl min-h-[300px] flex flex-col justify-center">
                        <h3 class="text-xl font-semibold text-blue-300 mb-4 text-center">${step.visualTitle}</h3>
                        <div class="text-base text-slate-200">
                            ${step.content}
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-4">
                        <button
                            class="custom-button p-3 px-6 text-sm font-semibold rounded-lg bg-slate-700 text-white hover:bg-slate-600"
                            onclick="loadScenario(${index - 1})"
                            ${index === 0 ? 'disabled' : ''}
                        >
                            &larr; Previous
                        </button>
                        <button
                            class="custom-button p-3 px-6 text-lg font-bold rounded-lg bg-emerald-600 text-slate-900 hover:bg-emerald-500"
                            onclick="loadScenario(${index + 1})"
                        >
                            ${step.nextButtonText} &rarr;
                        </button>
                    </div>
                </div>
            `;

            document.getElementById('progress-display').textContent = `Slide ${index + 1} / ${presentationSteps.length}`;
            const pct = Math.round(((index + 1) / presentationSteps.length) * 100);
            document.getElementById('score-display').textContent = `${pct}%`;
            const fill = document.getElementById('progress-bar-fill');
            if (fill) fill.style.width = `${pct}%`;
        }

        function showResults() {
            const contentDiv = document.getElementById('simulator-content');
            if (timerInterval) clearInterval(timerInterval);

            contentDiv.innerHTML = `
                <div class="text-center space-y-8 p-8 simulator-card">
                    <h2 class="text-3xl font-extrabold text-emerald-400">সমাপ্তি ও প্রশ্ন-উত্তর পর্ব!</h2>
                    <p class="text-2xl font-semibold text-blue-300">এতক্ষণ ধৈর্য ধরে শোনার জন্য ধন্যবাদ।</p>
                    <p class="text-lg text-slate-300">আপনাদের যদি সাইবারসিকিউরিটির যেকোনো দিক (ক্যারিয়ার, টেকনিক্যাল দক্ষতা, সার্টিফিকেশন) নিয়ে কোনো প্রশ্ন থাকে, তবে এখন করতে পারেন।</p>
                    <div class="pt-4">
                        <p class="text-xl font-bold text-red-400">মূল বার্তা: <strong class="text-white">শেখা থামিও না!</strong></p>
                    </div>
                    <button
                        class="custom-button p-3 px-6 text-lg font-bold rounded-lg bg-emerald-600 text-slate-900 hover:bg-emerald-500"
                        onclick="window.location.reload()"
                    >
                        শুরু থেকে দেখুন (Restart)
                    </button>
                </div>
            `;
            document.getElementById('progress-display').textContent = `সমাপ্ত!`;
            document.getElementById('score-display').textContent = `100%`;
            const fill = document.getElementById('progress-bar-fill');
            if (fill) fill.style.width = `100%`;
        }

        window.addEventListener('load', () => {
             document.getElementById('progress-display').textContent = 'Ready';
             document.getElementById('score-display').textContent = '—';
             document.getElementById('storage-mode-display').textContent = '00:00';
             document.getElementById('status-dashboard').style.display = 'none';
             document.getElementById('progress-bar-container').style.display = 'none';
        });
    </script>
