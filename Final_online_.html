        /* Custom styles for a professional, dark cybersecurity theme */
        :root {

            --background-color: #0f172a; /* Slate 900 */
            --card-bg: #1e293b; /* Slate 800 */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background-color);
            color: #f8fafc; /* Slate 50 */
            min-height: 100vh;
        }
        .simulator-card {
            background-color: var(--card-bg);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5), 0 4px 6px -2px rgba(0, 0, 0, 0.25);
            border-top: 4px solid var(--primary-color);
        }
        .custom-button {
            transition: all 0.2s;
            border: 1px solid var(--primary-color);
        }
        .custom-button:hover {
            background-color: var(--primary-color);
            color: var(--background-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.4);
        }
        /* Disable button style */
        .custom-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
            background-color: #334155; /* Slate 700 */
            color: #94a3b8; /* Slate 400 */
        }
        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 0.75rem;
            max-width: 90%;
            max-height: 90%;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        #cert-image-placeholder {
            max-width: 100%;
            height: auto;
            max-height: 60vh; 
        }
    </style>

                                <p class="text-xs">বিশ্বজুড়ে দক্ষ কর্মীর অভাব</p>
                            </div>
                            <div class="bg-slate-700 p-4 rounded-lg">
                                <h4 class="font-bold text-blue-400">💰 High Salary</h4>
                                <p class="text-xs">অন্যান্য IT জবের তুলনায় বেশি</p>
                            </div>
                            <div class="bg-slate-700 p-4 rounded-lg">
                                <h4 class="font-bold text-purple-400">🌍 Global Opportunity</h4>
                                <p class="text-xs">Remote Job & Relocation</p>
                            </div>
                            <div class="bg-slate-700 p-4 rounded-lg">
                                <h4 class="font-bold text-yellow-400">🚀 Impact</h4>
                                <p class="text-xs">মানুষ ও দেশকে সুরক্ষিত করার সুযোগ</p>
                            </div>
                        </div>
                    </div>
                `,
                nextButtonText: "Next: Conclusion"
            },

              // 🟢 SLIDE 14: Final Message - TEMPORARILY LEFT BLANK TO BE OVERWRITTEN BY showResults
            {
                id: 13,
                title: "১৩. শেষ কথা (Conclusion)",
                visualTitle: "Cybersecurity is a Human Safety Issue",
                content: ``,
                nextButtonText: "Restart Presentation"
            }
        ];

        let currentScenarioIndex = 0;
        let simulationStarted = false;

        // Function to show the modal with certificate details (used for certificates and TYPE diagram)
        window.showCertificateDetails = function(name, description, icon, imagePath) {
            const modal = document.getElementById('certificate-modal');
            const certImage = document.getElementById('cert-image-placeholder');
            const certTitle = document.getElementById('cert-title');
            const certDescription = document.getElementById('cert-description');

            certImage.src = imagePath;
            certImage.onerror = function() {
                this.src = `https://placehold.co/300x200/1e293b/a5f3fc?text=${name}+Img`;
            };

            certTitle.innerHTML = `${icon} ${name}`;
            certDescription.textContent = description;
            
            modal.style.display = 'flex';
        }
        
        // New specific function for the TYPE diagram to use the existing modal
        window.showTypeDiagram = function(imagePath) {
             showCertificateDetails('Attack Type Diagram', 'Offensive Security-এর বিভিন্ন ধরনের Attack Type ও Path এখানে দেখানো হয়েছে।', '🗺️', imagePath);
        }

        window.closeModal = function() {
            document.getElementById('certificate-modal').style.display = 'none';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        window.startSimulation = function() {
            if (simulationStarted) return;
            
            const contentDiv = document.getElementById('simulator-content');
            const dashboard = document.getElementById('status-dashboard');
            
            if (!contentDiv || !dashboard) return;

            simulationStarted = true;
            currentScenarioIndex = 0;
            dashboard.style.display = 'flex';
            loadScenario(currentScenarioIndex);
        }

        window.loadScenario = function(index) {
            const contentDiv = document.getElementById('simulator-content');
            
            if (index < 0) index = 0;
            // IMPORTANT: If we reach the end of the presentationSteps array, call showResults()
            if (index >= presentationSteps.length - 1 && index === 12) {
                showResults();
                return;
            } else if (index >= presentationSteps.length) {
                // If somehow index goes past the end (e.g., trying to click 'Next' on the final results page)
                window.location.reload();
                return;
            }

            currentScenarioIndex = index;
            const step = presentationSteps[index];

            contentDiv.innerHTML = `
                <div id="presentation-container" class="space-y-6">
                    <h2 class="text-2xl md:text-3xl font-bold text-emerald-400 text-center">${step.title}</h2>
                    <div class="p-5 rounded-xl bg-slate-800/70 border-l-4 border-blue-500 shadow-2xl min-h-[300px] flex flex-col justify-center">
                        <h3 class="text-xl font-semibold text-blue-300 mb-4 text-center">${step.visualTitle}</h3>
                        <div class="text-base text-slate-200">
                            ${step.content}
                        </div>
                    </div>
                    <div class="flex justify-between items-center pt-4">
                        <button 
                            class="custom-button p-3 px-6 text-sm font-semibold rounded-lg bg-slate-700 text-white hover:bg-slate-600"
                            onclick="loadScenario(${index - 1})"
                            ${index === 0 ? 'disabled' : ''}
                        >
                            &larr; Previous
                        </button>
                        <button 
                            class="custom-button p-3 px-6 text-lg font-bold rounded-lg bg-emerald-600 text-slate-900 hover:bg-emerald-500"
                            onclick="loadScenario(${index + 1})"
                        >
                            ${step.nextButtonText} &rarr;
                        </button>
                    </div>
                </div>
            `;
            window.saveProgress(currentScenarioIndex);
            
            // This displays Slide 1 / 13, 2 / 13, etc.
            document.getElementById('progress-display').textContent = `Slide ${index + 1} / ${presentationSteps.length}`;
        }

        function showResults() {
            const contentDiv = document.getElementById('simulator-content');

            contentDiv.innerHTML = `
                <div class="text-center space-y-8 p-8 simulator-card">
                    <h2 class="text-3xl font-extrabold text-emerald-400">সমাপ্তি ও প্রশ্ন-উত্তর পর্ব!</h2>
                    <p class="text-2xl font-semibold text-blue-300">এতক্ষণ ধৈর্য ধরে শোনার জন্য ধন্যবাদ।</p>
                    <p class="text-lg text-slate-300">আপনাদের যদি সাইবারসিকিউরিটির যেকোনো দিক (ক্যারিয়ার, টেকনিক্যাল দক্ষতা, সার্টিফিকেশন) নিয়ে কোনো প্রশ্ন থাকে, তবে এখন করতে পারেন।</p>
                    <div class="pt-4">
                        <p class="text-xl font-bold text-red-400">মূল বার্তা: **শেখা থামিও না!**</p>
                    </div>
                    <button 
                        class="custom-button p-3 px-6 text-lg font-bold rounded-lg bg-emerald-600 text-slate-900 hover:bg-emerald-500"
                        onclick="window.location.reload()"
                    >
                        শুরু থেকে দেখুন (Restart)
                    </button>
                </div>
            `;
            // Set the progress display to 'Finished!'
            document.getElementById('progress-display').textContent = `সমাপ্ত!`;
        }

        window.addEventListener('load', () => {
             document.getElementById('progress-display').textContent = 'Ready';
             document.getElementById('score-display').textContent = '—';
             document.getElementById('storage-mode-display').textContent = 'Offline';
             document.getElementById('status-dashboard').style.display = 'none';
        });

    </script>
</head>
<body>
    <div class="max-w-4xl mx-auto p-4 sm:p-6 lg:p-8">
        <!-- Header (Removed content for space efficiency) -->
        <header class="text-center mb-0 space-y-0 p-0 h-0"></header>

        <!-- Status Dashboard -->
        <div id="status-dashboard" class="flex justify-between items-center bg-slate-800 p-4 rounded-xl mb-8 border border-slate-700 shadow-xl" style="display: none;">
            <div>
                <p class="text-sm font-light text-slate-400">Mode</p>
                <p id="storage-mode-display" class="font-mono text-xs truncate">Offline</p>
            </div>
            <div>
                <p class="text-sm font-light text-slate-400">Slide</p>
                <p id="progress-display" class="text-lg font-bold text-blue-300">Ready</p>
            </div>
            <div>
                <p class="text-sm font-light text-slate-400">Info</p>
                <p id="score-display" class="text-2xl font-bold text-emerald-400">—</p>
            </div>
        </div>

        <!-- Simulation Content Area -->
        <div id="simulator-content" class="simulator-card rounded-xl p-6 sm:p-10 min-h-[500px] flex items-center justify-center">
            <div class="text-center space-y-8">
                <!-- HOMEPAGE TITLE: Smaller and lighter font style for aesthetic -->
                <h2 class="text-3xl font-bold text-emerald-400">সাইবারসিকিউরিটি সেমিনার সিমুলেটর</h2>
                <button 
                    class="custom-button p-4 px-8 text-xl font-bold rounded-lg bg-emerald-600 text-slate-900 hover:bg-emerald-500"
                    onclick="window.startSimulation()"
                >
                    শুরু করুন (Start)
                </button>
            </div>
        </div>

        <!-- Certificate Modal -->
        <div id="certificate-modal" class="modal" onclick="closeModal()">
            <div class="modal-content" onclick="event.stopPropagation()">
                <div class="flex justify-end">
                    <button class="text-3xl text-red-500 hover:text-red-400" onclick="closeModal()">
                        &times;
                    </button>
                </div>
                <div class="text-center space-y-4 pt-4">
                    <h3 id="cert-title" class="text-3xl font-extrabold text-emerald-400"></h3>
                    <img id="cert-image-placeholder" src="" alt="Certificate" class="mx-auto rounded-lg border-2 border-slate-600">
                    <p id="cert-description" class="text-lg text-slate-300"></p>
                    <p class="text-sm text-slate-500 pt-2">Click X or ESC to close</p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-10 text-center text-slate-500 text-sm">
            Offline Presentation Mode
        </footer>
    </div>
</body>
</html>
